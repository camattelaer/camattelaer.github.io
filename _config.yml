title: Charles-Alexandre Mattelaer
description: Computational (bio)chemist
url: "https://camattelaer.github.io"
baseurl: ""

author:
  name: Charles-Alexandre Mattelaer
  avatar: /assets/images/bio.jpg
  bio: I need to write this

remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache

markdown: kramdown
highlighter: rouge

atom_feed:
 hide: true

footer:
 links:
  - label: "LinkedIn"
    icon: "fab fa-linkedin"
    url: "https://www.linked.com/in/camattelaer&utm_content=profile"

  - label: "ORCID"
    icon: "fab fa-orcid"
    url: "https://orcid.org/0000-0002-8801-062X"

  - label: "Google Scholar"
    icon: "fas fa-graduation-cap"
    url: "https://scholar.google.com/citations?user=C1_8_scAAAAJ"

collections:
  computational-chemistry:
    output: true
    permalink: /computational-chemistry/:path/
  sysadmin:
    output: true
    permalink: /sysadmin/:path/

show_excerpts: true

defaults:
  - scope:
      path: ""
    values:
      classes: wide
  - scope:
      path: ""
      type: computational-chemistry
    values:
      layout: single

  - scope:
      path: ""
      type: sysadmin
    values:
      layout: single

paginate: 5
paginate_path: /page:num/

include:
 - _computational-chemistry
 - _sysadmin
